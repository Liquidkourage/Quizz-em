<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Winner stage preview — composed chrome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:ital,wght@0,700;0,900;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Mirror apps/display/src/index.css composed-stage rules for offline tuning. */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1220;
      }

      .tile {
        position: relative;
        width: 403px;
        height: 241px;
        overflow: hidden;
        border-radius: 12px;
        border: 2px solid rgba(226, 173, 26, 0.55);
        background: transparent;
        container-type: size;
      }

      .laurel {
        position: absolute;
        z-index: 0;
        width: 38%;
        max-height: 84%;
        top: 5%;
        object-fit: contain;
        pointer-events: none;
      }

      .laurel--left {
        left: 0;
      }

      .laurel--right {
        right: 0;
      }

      .column {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 86%;
        height: 100%;
        margin-inline: auto;
        padding: 1.2cqh 2% 0.8cqh;
        gap: 0.65cqh;
      }

      .crown {
        height: min(11cqh, 12.5cqw);
        width: auto;
        object-fit: contain;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1cqh;
        width: 100%;
      }

      .name {
        margin: 0;
        max-width: 72%;
        font-family: Montserrat, system-ui, sans-serif;
        font-size: min(7.4cqw, 11cqh);
        font-weight: 900;
        line-height: 1.05;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.95);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .pot {
        font-family: Bungee, system-ui, sans-serif;
        font-size: min(9cqw, 13cqh);
        line-height: 1;
        color: #e2ad1a;
        text-shadow: 1px 2px 0 rgba(0, 0, 0, 0.58);
      }

      .pot-sign {
        font-size: 0.68em;
      }

      .cards {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 3px;
      }

      .card {
        height: max(1.78rem, min(20cqw, 14.5cqh));
        width: max(1.24rem, min(14cqw, 10.2cqh));
        border-radius: 4px;
        border: 1px solid rgba(226, 173, 26, 0.65);
        background: linear-gradient(180deg, #10182a 0%, #060a12 100%);
        color: #e2ad1a;
        font-family: Bungee, system-ui, sans-serif;
        font-size: 1.05rem;
        display: grid;
        place-items: center;
      }

      .dot {
        align-self: flex-end;
        margin: 0 1px 8px;
        color: #e2ad1a;
        font-family: Bungee, system-ui, sans-serif;
      }

      .nameplate-wrap {
        position: relative;
        width: min(46%, 92%);
      }

      .nameplate {
        width: 100%;
        height: auto;
        display: block;
      }

      .diff {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 10%;
        margin: 0;
        font-family: Bungee, system-ui, sans-serif;
        font-size: min(6.8cqw, 9.5cqh);
        line-height: 1;
        color: #220610;
        -webkit-text-stroke: 0.45px rgba(255, 248, 230, 0.7);
        text-shadow: 0 0 2px rgba(255, 250, 235, 0.75);
      }

      .badge {
        position: absolute;
        left: 4px;
        top: 4px;
        z-index: 2;
        border-radius: 6px;
        border: 1px solid rgba(226, 173, 26, 0.85);
        background: rgba(0, 0, 0, 0.72);
        padding: 2px 7px;
        font-family: Montserrat, system-ui, sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        font-style: italic;
        color: #e2ad1a;
      }
    </style>
  </head>
  <body>
    <article class="tile" aria-label="Winner stage preview — Alice C.">
      <img class="laurel laurel--left" src="./showdown/laurel-left.png" alt="" />
      <img class="laurel laurel--right" src="./showdown/laurel-right.png" alt="" />
      <div class="column">
        <img class="crown" src="./showdown/crown.png" alt="" />
        <div class="content">
          <p class="name">Alice C.</p>
          <span class="pot"><span class="pot-sign">$</span>6,000</span>
          <div class="cards" aria-label="Cards used: 3, 2, . 0, 3, 4">
            <div class="card">3</div>
            <div class="card">2</div>
            <span class="dot">.</span>
            <div class="card">0</div>
            <div class="card">3</div>
            <div class="card">4</div>
          </div>
        </div>
        <div class="nameplate-wrap">
          <img class="nameplate" src="./showdown/nameplate.png" alt="" />
          <p class="diff">+0.034</p>
        </div>
      </div>
      <span class="badge">composed</span>
    </article>
  </body>
</html>
