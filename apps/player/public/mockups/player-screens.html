<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizz'em — Player phone mockups</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Rajdhani:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Rajdhani, system-ui, sans-serif;
        color: #f8fafc;
        background:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0, 255, 180, 0.08), transparent),
          radial-gradient(ellipse 60% 40% at 90% 100%, rgba(139, 92, 246, 0.1), transparent),
          #06060c;
      }

      header {
        padding: 2.5rem 1.5rem 1rem;
        text-align: center;
      }

      header h1 {
        margin: 0 0 0.4rem;
        font-family: Orbitron, monospace;
        font-size: clamp(1rem, 2.5vw, 1.35rem);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #00ffb4;
      }

      header p {
        margin: 0;
        max-width: 36rem;
        margin-inline: auto;
        color: rgba(255, 255, 255, 0.5);
        font-size: 1rem;
        line-height: 1.45;
      }

      .gallery {
        display: flex;
        gap: clamp(1.5rem, 4vw, 2.75rem);
        padding: 1.5rem clamp(1rem, 3vw, 2.5rem) 3.5rem;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }

      .slide {
        flex: 0 0 auto;
        scroll-snap-align: center;
        text-align: center;
      }

      .slide figcaption {
        margin-bottom: 0.85rem;
        font-family: Orbitron, monospace;
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
      }

      .slide img {
        display: block;
        height: min(78vh, 720px);
        width: auto;
        border-radius: 28px;
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.65),
          0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      footer {
        padding: 0 1.5rem 2.5rem;
        text-align: center;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.35);
      }

      footer a {
        color: rgba(0, 255, 180, 0.7);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Quizz'em Player</h1>
      <p>Five phone screens — join through showdown. Visual mockups for pitch decks and live-test walkthroughs.</p>
    </header>

    <div class="gallery" role="list">
      <figure class="slide" role="listitem">
        <figcaption>1 · Join</figcaption>
        <img src="./images/01-join.png" alt="Join screen after QR scan — name and venue code" width="390" height="844" />
      </figure>
      <figure class="slide" role="listitem">
        <figcaption>2 · Waiting pool</figcaption>
        <img
          src="./images/02-lobby-waiting.png"
          alt="Lobby waiting — you're in, waiting to be seated"
          width="390"
          height="844"
        />
      </figure>
      <figure class="slide" role="listitem">
        <figcaption>3 · Betting</figcaption>
        <img src="./images/03-betting.png" alt="Betting — your turn, call check fold" width="390" height="844" />
      </figure>
      <figure class="slide" role="listitem">
        <figcaption>4 · Answering</figcaption>
        <img src="./images/04-answering.png" alt="Answering — compose answer from digit cards" width="390" height="844" />
      </figure>
      <figure class="slide" role="listitem">
        <figcaption>5 · Showdown</figcaption>
        <img src="./images/05-showdown.png" alt="Showdown — your result and pot won" width="390" height="844" />
      </figure>
    </div>

    <footer>
      Open live app at <a href="/player/">/player/</a> · PNGs in <code>mockups/images/</code>
    </footer>
  </body>
</html>
